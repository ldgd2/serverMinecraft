name: appserve
description: "Minecraft Server Manager - Mobile App"
publish_to: 'none'
version: 2.2.3+9

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State Management
  provider: ^6.1.2

  # HTTP Client
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.2

  # UI & Animations
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  lottie: ^3.1.2

  # Utilities
  intl: ^0.19.0
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.1
  connectivity_plus: ^6.1.0
  flutter_dotenv: ^6.0.1
  web_socket_channel: ^3.0.3
  file_picker: ^8.1.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/gui/
    - assets/gui/sprites/
    - assets/gui/sprites/advancements/
    - assets/gui/sprites/statistics/
    - .env

  fonts:
    - family: MinecraftTen
      fonts:
        - asset: assets/fonts/MinecraftTen.ttf
    - family: Mojangles
      fonts:
        - asset: assets/fonts/Mojangles.ttf

